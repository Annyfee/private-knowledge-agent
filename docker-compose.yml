# 编排服务:对于docker compose up --build而言，俩文件(Dockerfile/docker-compose.yml)都需要 & build是打包镜像(代码/环境一更新就需要重新打包)，up是运行该镜像
#

# 定义要跑什么服务 - 属性已过时
# version: '3.8'

services:
  mcp-server:
    environment:
      - PYTHONPATH=/app #添加到搜索路径
    env_file:
      - .env
    build: .
    container_name: mcp_server
    command: ["python", "tools/mcp_server_local.py"]
    ports:
      - "8003:8003"
    restart: always
    volumes:
      - ./chroma_db:/app/chroma_db  # 知识库数据持久化
    working_dir: /app  # 确保工作目录正确
  research-backend:
    # 构建位置(依靠当前目录的Dockerfile来构建) 与 是否自动重启
    build: .
    restart: always
    container_name: research_backend
    # 左边(服务器端口)对外开放，右边(容器端口)内部监听，冒号实现流量转发
    ports:
      - "8011:8011"

    # 数据挂载 - 数据持久化:左边是宿主机，右边是容器内部 二者数据永远会实时同步，以防出现容器内部文件丢失造成文件丢失的情况 -- 挂载后的文件只需docker-compose up 无需--build
    volumes:
      # 映射文件
      - .:/app
      # 保护容器内的大文件/依赖 防止主机内容器为空覆盖
      - /app/.venv1
      - /app/chroma_db
    env_file:
      - .env

    environment: # 端口号
      - MCP_HOST=mcp-server # 环境变量注入，让后端获取

    depends_on:
      - mcp-server